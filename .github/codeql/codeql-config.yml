name: "Justice Companion CodeQL Config"

# Paths to exclude from analysis
paths-ignore:
  - '**/node_modules/**'
  - '**/dist/**'
  - '**/build/**'
  - '**/coverage/**'
  - '**/*.test.ts'
  - '**/*.test.tsx'
  - '**/*.spec.ts'
  - '**/*.spec.tsx'
  - '**/test-utils/**'
  - '**/vite.config.ts'
  - '**/vitest.config.ts'

# Paths to specifically include (optional - defaults to all)
paths:
  - 'src/**'
  - 'electron/**'

# Queries to run
queries:
  - uses: security-extended
  - uses: security-and-quality
